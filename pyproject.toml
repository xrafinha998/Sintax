[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "sintaxe"
version = "1.0.0"
description = "Linguagem de programação em Português simples e poderosa"
readme = "README.md"
requires-python = ">=3.7"
license = { text = "MIT" }

authors = [
  { name = "Seu Nome" }
]

keywords = ["linguagem", "programacao", "interprete", "portugues"]

classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent"
]

# 🔥 Isso cria comando no terminal
[project.scripts]
sintaxe = "main:main"
